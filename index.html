
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Tư vấn Pháp luật PCCC - Phú Thọ</title>
    <meta name="description" content="Hệ thống trí tuệ nhân tạo hỗ trợ giải đáp quy định, thủ tục hành chính về Phòng cháy chữa cháy.">
    
    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Libraries for Document Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --pccc-red: #dc2626; }
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Hide scrollbars but allow scrolling */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Scrollbar for Chat Area */
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Markdown Overrides */
        .markdown-body {
            font-size: 15px;
            line-height: 1.6;
        }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { 
            font-weight: 800; 
            margin-top: 1.5rem; 
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .markdown-body ul, .markdown-body ol { 
            margin-left: 1.25rem; 
            margin-bottom: 1rem;
            list-style-type: disc;
        }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body strong { font-weight: 700; color: #0f172a; }
        .markdown-body code { 
            background: #f1f5f9; 
            padding: 0.2rem 0.4rem; 
            border-radius: 0.375rem; 
            font-family: monospace;
            font-size: 0.9em;
        }

        /* User Message Markdown Overrides */
        .prose-invert strong { color: white; }
        .prose-invert code { background: rgba(255,255,255,0.1); color: white; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react-dom": "https://esm.sh/react-dom@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">
    <div id="root"></div>
    
    <!-- Initialize PDF.js Worker -->
    <script>
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
